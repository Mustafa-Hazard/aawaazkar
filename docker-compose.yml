services:
  db:
    image: postgres:15
    container_name: aawaazkar_db
    restart: always
    environment:
      POSTGRES_USER: aawaazkar
      POSTGRES_PASSWORD: aawaazkar123
      POSTGRES_DB: aawaazkar
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U aawaazkar' ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: aawaazkar_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: aawaazkar
      DATABASE_PASSWORD: aawaazkar123
      DATABASE_NAME: aawaazkar
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      PORT: 4000
    ports:
      - '4000:4000'

  frontend:
    build:
      context: ./frontend
    container_name: aawaazkar_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - '5173:5173'

volumes:
  pgdata:
