services:
  db:
    image: postgres:15
    container_name: aawaazkar_db
    restart: always
    environment:
      POSTGRES_USER: aawaazkar
      POSTGRES_PASSWORD: aawaazkar123
      POSTGRES_DB: aawaazkar
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
